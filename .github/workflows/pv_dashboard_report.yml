name: PV Campaign Dashboard Report

on:
  schedule:
    # Every Monday at 12:00 UTC (8:00 AM EST / 9:00 AM Argentina)
    - cron: '0 12 * * 1'
  workflow_dispatch: {}  # Allow manual trigger

jobs:
  generate-dashboard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate and email dashboard
        env:
          SF_CLIENT_ID: ${{ secrets.SF_CLIENT_ID }}
          SF_CLIENT_SECRET: ${{ secrets.SF_CLIENT_SECRET }}
          SF_REFRESH_TOKEN: ${{ secrets.SF_REFRESH_TOKEN }}
          SF_INSTANCE_URL: ${{ secrets.SF_INSTANCE_URL }}
          SF_DOMAIN: ${{ secrets.SF_DOMAIN }}
          GMAIL_SENDER: ${{ secrets.GMAIL_SENDER }}
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
          SUBSCRIBERS: ${{ secrets.PV_DASHBOARD_SUBSCRIBERS }}  # Recipients of the PV campaign PDF report
          REPORT_CC: ${{ secrets.REPORT_CC }}  # CC'd on the PDF report email
        run: python send_pv_dashboard_report.py --email

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: pv-dashboard-report
          path: pv_dashboard_report_*.pdf
          retention-days: 30
